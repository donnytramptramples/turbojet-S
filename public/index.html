<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
		/>
		<title>Scramjet</title>

		<link rel="shortcut icon" href="favicon.ico" />

		<script src="/scram/scramjet.all.js"></script>
		<script src="/baremux/index.js"></script>

		<link rel="stylesheet" href="index.css" />
		<script src="register-sw.js" defer></script>
		<script src="search.js" defer></script>
		<script src="index.js" defer></script>
	</head>

	<body>
		<header id="chrome">
			<div id="tabbar">
				<div id="tabs"></div>
				<button id="new-tab" type="button" title="New tab" aria-label="New tab">
					<svg viewBox="0 0 24 24" width="16" height="16">
						<path
							fill="currentColor"
							d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2Z"
						/>
					</svg>
				</button>
			</div>
			<div id="addressbar">
				<form id="sj-form">
					<input
						id="sj-search-engine"
						value="https://www.google.com/search?q=%s"
						type="hidden"
					/>
					<input
						id="sj-address"
						type="text"
						placeholder="Search or enter address"
						autocomplete="off"
					/>
				</form>
			</div>
		</header>

		<main id="viewport">
			<div id="frames"></div>
			<div id="home-screen">
				<div class="home-card">
					<img class="logo" src="sj.png" alt="Scramjet" />
					<h1>Scramjet</h1>
					<p>Search or enter an address above to begin.</p>
					<p id="sj-error"></p>
					<pre id="sj-error-code"></pre>
				</div>
			</div>
		</main>

		<!-- Lock / setup overlay -->
		<div id="lock-overlay">
			<div id="lock-card">
				<div id="lock-avatar">
					<svg viewBox="0 0 24 24" width="64" height="64">
						<path
							fill="currentColor"
							d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5Zm0 2c-3.33 0-10 1.67-10 5v3h20v-3c0-3.33-6.67-5-10-5Z"
						/>
					</svg>
				</div>
				<h2 id="lock-title">Enter password</h2>
				<p id="lock-sub">Welcome back</p>
				<form id="lock-form">
					<input
						id="lock-password"
						type="password"
						placeholder="Password"
						autocomplete="current-password"
					/>
					<input
						id="lock-confirm"
						type="password"
						placeholder="Confirm password"
						autocomplete="new-password"
					/>
					<button id="lock-submit" type="submit">Unlock</button>
					<p id="lock-error"></p>
				</form>
			</div>
		</div>

		<button id="lock-button" title="Lock" aria-label="Lock">
			<svg viewBox="0 0 24 24" width="16" height="16">
				<path
					fill="currentColor"
					d="M12 2a5 5 0 0 0-5 5v3H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2h-1V7a5 5 0 0 0-5-5Zm-3 8V7a3 3 0 0 1 6 0v3Z"
				/>
			</svg>
		</button>
	</body>
</html>
